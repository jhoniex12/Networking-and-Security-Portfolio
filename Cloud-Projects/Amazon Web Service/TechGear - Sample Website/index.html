<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Records App</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f8f9fa;
      margin: 40px;
      color: #333;
    }
    h1 {
      color: #0069d9;
    }
    nav {
      margin-bottom: 20px;
    }
    nav button {
      padding: 10px 20px;
      margin-right: 10px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }
    nav button:hover {
      background-color: #0056b3;
    }
    .section {
      display: none;
      padding: 20px;
      background-color: white;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: #e9ecef;
    }
    input {
      margin: 5px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button[type="submit"] {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
    }
    button[type="submit"]:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <h1>Student Records Management</h1>

  <!-- Menu -->
  <nav>
    <button id="insertMenu">Insert Student</button>
    <button id="viewMenu">View Students</button>
    <button id="deleteMenu">Delete Student</button>
  </nav>

  <!-- Insert Form -->
  <div id="insertSection" class="section">
    <h2>Insert New Student</h2>
    <form id="studentForm">
      <input type="text" id="name" placeholder="Name" required />
      <input type="text" id="address" placeholder="Address" required />
      <input type="text" id="city" placeholder="City" required />
      <input type="text" id="state" placeholder="State" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="text" id="phone" placeholder="Phone" required />
      <button type="submit">Submit</button>
    </form>
  </div>

  <!-- View Table -->
  <div id="viewSection" class="section">
    <h2>Student List</h2>
    <table id="studentTable">
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Address</th><th>City</th>
          <th>State</th><th>Email</th><th>Phone</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Delete Section -->
  <div id="deleteSection" class="section">
    <h2>Delete Student</h2>
    <p>Enter the <strong>ID</strong> of the student to delete:</p>
    <input type="number" id="deleteId" placeholder="Student ID" />
    <button id="deleteBtn">Delete</button>
  </div>

  <script>
    const apiBase = 'http:// 13.238.194.220:3000'; // IP address of the EC2 instance

    function showSection(sectionId) {
      $('.section').hide();
      $(sectionId).fadeIn();
    }

    // Menu clicks
    $('#insertMenu').click(() => showSection('#insertSection'));
    $('#viewMenu').click(() => {
      showSection('#viewSection');
      loadStudents();
    });
    $('#deleteMenu').click(() => showSection('#deleteSection'));

    // Insert student
    $('#studentForm').submit(function (e) {
      e.preventDefault();
      const student = {
        name: $('#name').val(),
        address: $('#address').val(),
        city: $('#city').val(),
        state: $('#state').val(),
        email: $('#email').val(),
        phone: $('#phone').val()
      };

      $.ajax({
        url: apiBase + '/students',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(student),
        success: function () {
          alert('✅ Student added successfully!');
          $('#studentForm')[0].reset();
        },
        error: function () {
          alert('❌ Error adding student.');
        }
      });
    });

    // Load student records
    function loadStudents() {
      $.ajax({
        url: apiBase + '/students',
        method: 'GET',
        success: function (students) {
          const tableBody = $('#studentTable tbody');
          tableBody.empty();

          students.forEach(student => {
            const row = `
              <tr>
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.address}</td>
                <td>${student.city}</td>
                <td>${student.state}</td>
                <td>${student.email}</td>
                <td>${student.phone}</td>
              </tr>
            `;
            tableBody.append(row);
          });
        },
        error: function () {
          alert('❌ Failed to load students.');
        }
      });
    }

    // Delete student
    $('#deleteBtn').click(() => {
      const id = $('#deleteId').val();
      if (!id) {
        alert('⚠️ Please enter a student ID.');
        return;
      }

      if (!confirm(`Are you sure you want to delete student ID ${id}?`)) return;

      $.ajax({
        url: `${apiBase}/students/${id}`,
        method: 'DELETE',
        success: function () {
          alert(`✅ Student ID ${id} deleted successfully.`);
          $('#deleteId').val('');
        },
        error: function () {
          alert(`❌ Failed to delete student ID ${id}.`);
        }
      });
    });

    // Default view
    $('#insertMenu').click();
  </script>

</body>
</html>
